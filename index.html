<!DOCTYPE html>
<html>
<head>
    <title>MOVIEAI – Filmmaker Toolkit</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: radial-gradient(circle at top, #2b2b2b 0%, #111111 70%);
            color: #f3e7c9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Film Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            opacity: 0.05;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 950px;
            padding: 50px;
            background: rgba(25, 25, 25, 0.95);
            border: 2px solid #c6a75e;
            border-radius: 12px;
            box-shadow: 
                0 0 30px rgba(198, 167, 94, 0.15),
                inset 0 0 20px rgba(198, 167, 94, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 42px;
            letter-spacing: 6px;
            margin-bottom: 35px;
            color: #d4af37;
            text-transform: uppercase;
        }

        input {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #8c7853;
            color: #f3e7c9;
            font-size: 14px;
            letter-spacing: 1px;
            border-radius: 4px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .buttons {
            margin-top: 25px;
            text-align: center;
        }

        button {
            background: transparent;
            border: 1px solid #c6a75e;
            color: #d4af37;
            padding: 10px 18px;
            margin: 6px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        button:hover {
            background: #c6a75e;
            color: #111;
            box-shadow: 0 0 15px rgba(198, 167, 94, 0.5);
        }

        #output {
            margin-top: 35px;
            padding: 25px;
            background: #141414;
            border-left: 4px solid #c6a75e;
            border-radius: 6px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: inset 0 0 15px rgba(198, 167, 94, 0.08);
            min-height: 150px;
        }

        .export-container {
            text-align: center;
            margin-top: 25px;
        }

        .export-btn {
            background: #b08d46;
            border: 1px solid #b08d46;
            color: #111;
        }

        .export-btn:hover {
            background: #d4af37;
            color: #111;
        }

    </style>
</head>

<body>

<div class="container">

<h1>MOVIEAI</h1>

<input type="text" id="main_theme" placeholder="Main Theme (Revenge, Love...)">
<input type="text" id="setting" placeholder="Setting (1940s Chicago...)">
<input type="text" id="tone" placeholder="Tone (Noir, Emotional...)">

<div class="buttons">
    <button onclick="generateModule('character')">Character</button>
    <button onclick="generateModule('screenplay')">Screenplay</button>
    <button onclick="generateModule('shots')">Shots</button>
    <button onclick="generateModule('budget')">Budget</button>
    <button onclick="generateModule('schedule')">Schedule</button>
    <button onclick="generateModule('moodboard')">Moodboard</button>
    <button onclick="generateModule('casting')">Casting</button>
    <button onclick="generateModule('dialogue')">Dialogue</button>
</div>

<div id="output"></div>

<div class="export-container">
    <button class="export-btn" onclick="exportScreenplay()">Export Screenplay</button>
</div>

</div>

<script>
async function generateModule(type) {

    const main_theme = document.getElementById("main_theme").value;
    const setting = document.getElementById("setting").value;
    const tone = document.getElementById("tone").value;

    const response = await fetch("/generate-module", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            type: type,
            inputs: {
                main_theme: main_theme,
                setting: setting,
                tone: tone
            }
        })
    });

    const data = await response.json();
    document.getElementById("output").innerText = data.result;
}

async function exportScreenplay() {
    const content = document.getElementById("output").innerText;

    const response = await fetch("/export-screenplay", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ content: content })
    });

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "screenplay.txt";
    a.click();
}
</script>

</body>
</html>
